<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Di Iorio Inmobiliaria - Detalle de propiedad">
  <meta name="theme-color" content="#1a1a1a">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/Guia de marca/logo iorio.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asap:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* =============================================
       Property Detail Page — Self-contained styles
       ============================================= */

    /* Page shell */
    .property-page {
      padding-top: 72px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .property-page__back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      color: var(--gray-600);
      font-weight: 500;
      transition: color 0.2s;
    }
    .property-page__back:hover { color: var(--primary-color); }

    /* ---- Gallery ---- */
    .property-gallery {
      position: relative;
      background: var(--gray-100);
      overflow: hidden;
      border-radius: 0;          /* mobile: no radius */
    }

    .property-gallery__main-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
    }

    .property-gallery__main {
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    .property-gallery__arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 2;
      transition: background .2s;
      padding: 0;
    }
    .property-gallery__arrow:hover { background: rgba(0,0,0,.7); }
    .property-gallery__arrow--prev { left: .75rem; }
    .property-gallery__arrow--next { right: .75rem; }

    .property-gallery__counter {
      position: absolute;
      bottom: .75rem;
      right: .75rem;
      padding: .25rem .75rem;
      font-size: .8125rem;
      font-weight: 500;
      color: #fff;
      background: rgba(0,0,0,.5);
      border-radius: 2rem;
      z-index: 2;
    }

    .property-gallery__thumbs {
      display: flex;
      gap: .5rem;
      padding: .75rem 1rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      background: var(--gray-100);
    }
    .property-gallery__thumbs::-webkit-scrollbar { height: 4px; }
    .property-gallery__thumbs::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

    .property-gallery__thumb {
      flex-shrink: 0;
      width: 80px;
      height: 56px;
      object-fit: cover;
      border-radius: .375rem;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .6;
      transition: opacity .2s, border-color .2s;
    }
    .property-gallery__thumb:hover { opacity: .85; }
    .property-gallery__thumb--active { opacity: 1; border-color: var(--primary-color); }

    .property-gallery--single .property-gallery__arrow,
    .property-gallery--single .property-gallery__counter,
    .property-gallery--single .property-gallery__thumbs { display: none; }

    .property-gallery__badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      padding: .5rem 1rem;
      font-size: .875rem;
      font-weight: 600;
      text-transform: uppercase;
      border-radius: .5rem;
      color: #fff;
      z-index: 2;
    }
    .property-gallery__badge--venta     { background: var(--primary-color); }
    .property-gallery__badge--alquiler  { background: var(--secondary-color); }
    .property-gallery__badge--vendido   { background: var(--success); }
    .property-gallery__badge--alquilado { background: #8b5cf6; }
    .property-gallery__badge--reservado { background: var(--warning); }

    /* ---- Sidebar (contact + CTA) ---- */
    .property-sidebar {
      padding: 1rem;
    }

    .property-contact-card {
      background: var(--gray-50);
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .property-contact-card h3 {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .property-contact-card p {
      font-size: .9375rem;
      color: var(--gray-600);
      margin-bottom: .5rem;
    }

    .property-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      background: #fff;
      box-shadow: 0 -4px 20px rgba(0,0,0,.1);
      display: flex;
      gap: .75rem;
      z-index: 100;
    }
    .property-cta .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 1rem;
      font-weight: 600;
      border-radius: .75rem;
      text-decoration: none;
    }
    .btn--whatsapp       { background: #25D366; color: #fff; }
    .btn--whatsapp:hover { background: #20bd5a; }
    .btn--phone          { background: var(--primary-color); color: #fff; }
    .btn--phone:hover    { background: var(--primary-light); }

    /* ---- Content (details below gallery) ---- */
    .property-content {
      padding: 2rem 1rem 6rem;   /* 6rem bottom = space for fixed CTA on mobile */
    }

    .property-header { margin-bottom: 2rem; }

    .property-header__type {
      display: inline-block;
      padding: .25rem .75rem;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: var(--gray-100);
      color: var(--gray-600);
      border-radius: .25rem;
      margin-bottom: .75rem;
    }

    .property-header__title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: .5rem;
    }

    .property-header__location {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: 1rem;
      color: var(--gray-500);
    }
    .property-header__location svg { flex-shrink: 0; }

    .property-price {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 2rem;
    }

    .property-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 1.5rem;
      background: var(--gray-50);
      border-radius: 1rem;
      margin-bottom: 2rem;
    }

    .property-feature { display: flex; align-items: center; gap: .75rem; }

    .property-feature__icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: .75rem;
      color: var(--primary-color);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .property-feature__text { font-size: .875rem; color: var(--gray-500); }
    .property-feature__value { display: block; font-size: 1.125rem; font-weight: 600; color: var(--gray-900); }

    .property-section { margin-bottom: 2rem; }
    .property-section__title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 2px solid var(--gray-100);
    }

    .property-description { font-size: 1rem; line-height: 1.8; color: var(--gray-600); }

    .property-amenities { display: flex; flex-wrap: wrap; gap: .75rem; }
    .property-amenity {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem 1rem;
      font-size: .875rem;
      color: var(--gray-700);
      background: var(--gray-100);
      border-radius: 2rem;
    }
    .property-amenity svg { color: var(--success); }

    /* ---- Small mobile ---- */
    @media (max-width: 767px) {
      .property-page { padding-top: 64px; }
      .property-gallery__arrow { width: 34px; height: 34px; }
      .property-gallery__thumb { width: 64px; height: 44px; }
    }
    @media (max-width: 479px) {
      .property-features { grid-template-columns: 1fr; }
    }

    /* ---- Desktop layout: gallery + sidebar side by side ---- */
    @media (min-width: 1024px) {
      .property-page__inner {
        display: grid;
        grid-template-columns: 1fr 380px;
        grid-template-rows: auto 1fr;
        gap: 0 2rem;
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem 1.5rem 0;
      }

      /* Gallery = col 1, row 1 */
      .property-gallery {
        grid-column: 1;
        grid-row: 1;
        border-radius: 1rem;
        height: auto;
        position: relative;
        top: auto;
      }
      .property-gallery__main-wrapper { aspect-ratio: 4 / 3; }

      /* Sidebar = col 2, row 1 */
      .property-sidebar {
        grid-column: 2;
        grid-row: 1;
        padding: 0;
        position: sticky;
        top: 90px;
        align-self: start;
      }

      /* Content = full width, row 2 */
      .property-content {
        grid-column: 1 / -1;
        grid-row: 2;
        padding: 2rem 0;
        max-width: none;
      }

      /* CTA becomes static in sidebar */
      .property-cta {
        position: static;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
        border-radius: 1rem;
        padding: 1.5rem;
        background: #fff;
      }

      .property-features { grid-template-columns: repeat(3, 1fr); }
    }

    @media (min-width: 1280px) {
      .property-features { grid-template-columns: repeat(4, 1fr); }
    }

    /* ---- Error / Loading ---- */
    .property-loading,
    .property-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      padding: 2rem;
    }
    .property-error__icon { width: 64px; height: 64px; margin-bottom: 1rem; color: var(--gray-300); }
    .property-error__title { font-size: 1.25rem; font-weight: 600; color: var(--gray-900); margin-bottom: .5rem; }
    .property-error__text { color: var(--gray-500); margin-bottom: 1.5rem; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <title>Propiedad | Di Iorio Inmobiliaria</title>
</head>
<body>
  <!-- Header -->
  <header class="header" role="banner">
    <div class="header__inner container">
      <a href="index.html" class="header__logo" aria-label="Di Iorio Inmobiliaria - Inicio">
        <img src="assets/images/Guia de marca/logo iorio.png" alt="Di Iorio" class="header__logo-icon" style="width: 48px; height: 40px; object-fit: contain; background: none;">
        <div class="header__logo-text">
          Di Iorio
          <span>Operador Inmobiliario</span>
        </div>
      </a>

      <button class="header__menu-btn" aria-label="Abrir menú" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" role="navigation" aria-label="Navegación principal">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Inicio</a></li>
          <li><a href="index.html#propiedades" class="nav__link">Propiedades</a></li>
          <li><a href="index.html#servicios" class="nav__link">Servicios</a></li>
          <li><a href="index.html#contacto" class="nav__link">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="property-page" id="property-page">
    <!-- Content will be loaded by JavaScript -->
    <div class="property-loading">
      <div class="spinner"></div>
      <p style="margin-top: 1rem; color: var(--gray-500);">Cargando propiedad...</p>
    </div>
  </main>

  <!-- Scripts -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/properties-data.js"></script>
  <script>
    // Get property ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = parseInt(urlParams.get('id'));

    // Format price
    function formatPrice(price, currency) {
      if (currency === 'USD') {
        return `USD ${price.toLocaleString('es-AR')}`;
      }
      return `$ ${price.toLocaleString('es-AR')}`;
    }

    // Get property image
    function getPropertyImage(property) {
      if (property && property.coverImage) {
        if (property.coverImage.startsWith('data:') || property.coverImage.startsWith('/uploads/')) return property.coverImage;
        return `assets/images/properties/${property.coverImage}`;
      }
      if (property && property.images && property.images.length > 0) {
        const img = property.images[0];
        if (img.startsWith('data:') || img.startsWith('/uploads/')) return img;
      }
      const imageNumber = ((property.id - 1) % 25) + 1;
      return `assets/images/properties/prop-${imageNumber}.jpg`;
    }

    // Get property type label
    function getTypeLabel(type) {
      const types = { casa:'Casa', departamento:'Departamento', ph:'PH', local:'Local Comercial', oficina:'Oficina', terreno:'Terreno', lote:'Lote', cochera:'Cochera' };
      return types[type] || type;
    }

    // Get operation label
    function getOperationLabel(operation) {
      const operations = { venta:'En Venta', alquiler:'En Alquiler', vendido:'Vendido', alquilado:'Alquilado', reservado:'Reservado' };
      return operations[operation] || operation;
    }

    // Build all images array for a property
    function getAllImages(property) {
      const images = [];
      if (property.coverImage) {
        if (property.coverImage.startsWith('data:') || property.coverImage.startsWith('/uploads/')) {
          images.push(property.coverImage);
        }
      }
      if (property.images && property.images.length > 0) {
        property.images.forEach(img => {
          if (img.startsWith('data:') || img.startsWith('/uploads/')) {
            if (!images.includes(img)) images.push(img);
          }
        });
      }
      if (images.length === 0) {
        images.push(getPropertyImage(property));
      }
      return images;
    }

    // Render property page
    function renderProperty(property) {
      const page = document.getElementById('property-page');
      const whatsappMessage = encodeURIComponent(`Hola, me interesa la propiedad: ${property.title} (ID: ${property.id})`);
      const allImages = getAllImages(property);
      const isSingle = allImages.length <= 1;

      document.title = `${property.title} | Di Iorio Inmobiliaria`;

      const thumbsHTML = allImages.map((src, i) =>
        `<img src="${src}" alt="Foto ${i + 1}" class="property-gallery__thumb${i === 0 ? ' property-gallery__thumb--active' : ''}" data-index="${i}" onerror="this.style.display='none'">`
      ).join('');

      const locationParts = [
        property.location.address,
        property.location.neighborhood,
        property.location.city
      ].filter(Boolean);

      page.innerHTML = `
        <a href="index.html#propiedades" class="property-page__back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver a propiedades
        </a>

        <div class="property-page__inner">
          <div class="property-gallery${isSingle ? ' property-gallery--single' : ''}">
            <div class="property-gallery__main-wrapper">
              <img src="${allImages[0]}" alt="${property.title}" class="property-gallery__main" onerror="this.src='https://placehold.co/800x600/e5e7eb/9ca3af?text=Sin+imagen'">
              <button class="property-gallery__arrow property-gallery__arrow--prev" aria-label="Imagen anterior">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
              <button class="property-gallery__arrow property-gallery__arrow--next" aria-label="Imagen siguiente">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
              <span class="property-gallery__counter">1 / ${allImages.length}</span>
              <span class="property-gallery__badge property-gallery__badge--${property.operation}">
                ${getOperationLabel(property.operation)}
              </span>
            </div>
            <div class="property-gallery__thumbs">
              ${thumbsHTML}
            </div>
          </div>

          <aside class="property-sidebar">
            <div class="property-contact-card">
              <h3>Di Iorio Inmobiliaria</h3>
              <p><strong>Dirección:</strong> San Martín 170, Chivilcoy, Buenos Aires</p>
              <p><strong>Horarios:</strong> Lun-Vie 9-12hs y 16-19hs</p>
            </div>

            <div class="property-cta">
              <a href="https://wa.me/542346566388?text=${whatsappMessage}" target="_blank" class="btn btn--whatsapp">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                WhatsApp
              </a>
              <a href="tel:+542346566388" class="btn btn--phone">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                Llamar
              </a>
            </div>
          </aside>

          <div class="property-content">
            <header class="property-header">
              <span class="property-header__type">${getTypeLabel(property.type)}</span>
              <h1 class="property-header__title">${property.title}</h1>
              <p class="property-header__location">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
                ${locationParts.join(', ')}
              </p>
            </header>

            <p class="property-price">${property.showPrice !== false ? formatPrice(property.price, property.currency) : 'Consultar'}</p>

            <div class="property-features">
              ${property.features.bedrooms > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 7v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"></path>
                      <path d="M21 7H3l2-4h14l2 4z"></path>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.bedrooms}</span>
                    Ambientes
                  </div>
                </div>
              ` : ''}
              ${property.features.bathrooms > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"></path>
                      <line x1="2" y1="12" x2="22" y2="12"></line>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.bathrooms}</span>
                    ${property.features.bathrooms === 1 ? 'Baño' : 'Baños'}
                  </div>
                </div>
              ` : ''}
              <div class="property-feature">
                <div class="property-feature__icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  </svg>
                </div>
                <div class="property-feature__text">
                  <span class="property-feature__value">${property.features.area} m²</span>
                  Superficie total
                </div>
              </div>
              ${property.features.coveredArea > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.coveredArea} m²</span>
                    Cubiertos
                  </div>
                </div>
              ` : ''}
              ${property.features.garage > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M19 17h2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10h2"></path>
                      <circle cx="6.5" cy="17.5" r="2.5"></circle>
                      <circle cx="17.5" cy="17.5" r="2.5"></circle>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.garage}</span>
                    ${property.features.garage === 1 ? 'Cochera' : 'Cocheras'}
                  </div>
                </div>
              ` : ''}
            </div>

            <section class="property-section">
              <h2 class="property-section__title">Descripción</h2>
              <p class="property-description">${property.description}</p>
            </section>

            ${property.amenities && property.amenities.length > 0 ? `
              <section class="property-section">
                <h2 class="property-section__title">Amenities y características</h2>
                <div class="property-amenities">
                  ${property.amenities.map(amenity => `
                    <span class="property-amenity">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                      ${amenity}
                    </span>
                  `).join('')}
                </div>
              </section>
            ` : ''}
          </div>
        </div>
      `;

      // Initialize mobile menu
      initMobileMenu();

      // Initialize carousel
      if (allImages.length > 1) {
        let currentIndex = 0;
        const mainImg = document.querySelector('.property-gallery__main');
        const counter = document.querySelector('.property-gallery__counter');
        const thumbs = document.querySelectorAll('.property-gallery__thumb');
        const thumbsContainer = document.querySelector('.property-gallery__thumbs');
        const wrapper = document.querySelector('.property-gallery__main-wrapper');

        function showSlide(index) {
          currentIndex = ((index % allImages.length) + allImages.length) % allImages.length;
          mainImg.src = allImages[currentIndex];
          counter.textContent = `${currentIndex + 1} / ${allImages.length}`;
          thumbs.forEach((t, i) => t.classList.toggle('property-gallery__thumb--active', i === currentIndex));
          const activeThumb = thumbs[currentIndex];
          if (activeThumb && thumbsContainer) {
            const offset = activeThumb.offsetLeft - thumbsContainer.offsetWidth / 2 + activeThumb.offsetWidth / 2;
            thumbsContainer.scrollTo({ left: offset, behavior: 'smooth' });
          }
        }

        document.querySelector('.property-gallery__arrow--prev').addEventListener('click', () => showSlide(currentIndex - 1));
        document.querySelector('.property-gallery__arrow--next').addEventListener('click', () => showSlide(currentIndex + 1));

        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => showSlide(parseInt(thumb.dataset.index)));
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft') showSlide(currentIndex - 1);
          if (e.key === 'ArrowRight') showSlide(currentIndex + 1);
        });

        let touchStartX = 0;
        wrapper.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        wrapper.addEventListener('touchend', (e) => {
          const diff = touchStartX - e.changedTouches[0].screenX;
          if (Math.abs(diff) > 50) showSlide(currentIndex + (diff > 0 ? 1 : -1));
        }, { passive: true });
      }
    }

    // Show error state
    function showError() {
      const page = document.getElementById('property-page');
      page.innerHTML = `
        <div class="property-error">
          <svg class="property-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <h2 class="property-error__title">Propiedad no encontrada</h2>
          <p class="property-error__text">La propiedad que buscás no existe o fue removida.</p>
          <a href="index.html#propiedades" class="btn btn--primary">Ver todas las propiedades</a>
        </div>
      `;
    }

    // Mobile menu
    function initMobileMenu() {
      const menuBtn = document.querySelector('.header__menu-btn');
      const nav = document.querySelector('.nav');
      menuBtn?.addEventListener('click', () => {
        menuBtn.classList.toggle('active');
        nav?.classList.toggle('active');
        document.body.style.overflow = nav?.classList.contains('active') ? 'hidden' : '';
      });
    }

    // Initialize
    async function init() {
      if (!propertyId) { showError(); return; }

      try {
        if (window.API) {
          const property = await window.API.getProperty(propertyId);
          if (property) { renderProperty(property); return; }
        }
      } catch (e) {
        console.warn('API fetch failed, trying local data');
      }

      if (window.PROPERTIES_DATA) {
        const property = window.PROPERTIES_DATA.properties.find(p => p.id === propertyId);
        if (property) { renderProperty(property); return; }
      }

      await new Promise((resolve) => {
        window.addEventListener('properties-loaded', resolve, { once: true });
        setTimeout(resolve, 5000);
      });

      if (window.PROPERTIES_DATA) {
        const property = window.PROPERTIES_DATA.properties.find(p => p.id === propertyId);
        if (property) { renderProperty(property); return; }
      }

      showError();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
