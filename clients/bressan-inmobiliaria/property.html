<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Vairo Propiedades — Detalle de propiedad">
  <meta name="theme-color" content="#D9622E">

  <link rel="icon" type="image/png" href="assets/images/logos/vairo-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles.css">

  <title>Propiedad · Vairo Propiedades</title>

  <style>
    /* ============================================================
       Property Detail — Vairo
       ============================================================ */
    .property-page {
      padding-top: 1rem;
      padding-bottom: 4rem;
      min-height: 60vh;
      background: var(--paper);
    }

    .property-page__back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1.25rem 1.25rem 0.75rem;
      color: var(--ink-mute);
      font-size: 0.9375rem;
      font-weight: 500;
      transition: color var(--t-fast);
    }
    .property-page__back:hover { color: var(--terracotta); }

    .property-page__inner {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 1.25rem;
    }
    @media (min-width: 768px) { .property-page__inner { padding: 0 2rem; } }
    @media (min-width: 1280px) { .property-page__inner { padding: 0 2.5rem; } }

    /* ---- Gallery ---- */
    .property-gallery {
      position: relative;
      background: var(--sand);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .property-gallery__main-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
    }
    .property-gallery__main {
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }
    .property-gallery__arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(251, 247, 236, 0.94);
      backdrop-filter: blur(6px);
      color: var(--ink);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 2;
      transition: all var(--t-base);
      padding: 0;
      box-shadow: var(--shadow-sm);
    }
    .property-gallery__arrow:hover { background: var(--terracotta); color: var(--bone); transform: translateY(-50%) scale(1.05); }
    .property-gallery__arrow--prev { left: 0.875rem; }
    .property-gallery__arrow--next { right: 0.875rem; }

    .property-gallery__counter {
      position: absolute;
      bottom: 0.875rem;
      right: 0.875rem;
      padding: 0.35rem 0.875rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--bone);
      background: rgba(26, 20, 16, 0.7);
      backdrop-filter: blur(6px);
      border-radius: var(--radius-full);
      z-index: 2;
    }
    .property-gallery__badge {
      position: absolute;
      top: 0.875rem;
      left: 0.875rem;
      padding: 0.35rem 0.875rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bone);
      background: var(--ink);
      border-radius: var(--radius-full);
      z-index: 2;
    }
    .property-gallery__badge--venta { background: var(--terracotta); }
    .property-gallery__badge--alquiler { background: var(--ink); }
    .property-gallery__badge--vendido,
    .property-gallery__badge--alquilado { background: var(--ink-mute); }
    .property-gallery__badge--reservado { background: var(--accent-gold); color: var(--ink); }

    .property-gallery__thumbs {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      overflow-x: auto;
      scroll-behavior: smooth;
      background: var(--bone);
      border-top: 1px solid var(--line);
    }
    .property-gallery__thumbs::-webkit-scrollbar { height: 6px; }
    .property-gallery__thumbs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
    .property-gallery__thumb {
      flex-shrink: 0;
      width: 88px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      cursor: pointer;
      opacity: 0.65;
      transition: all var(--t-fast);
      border: 2px solid transparent;
    }
    .property-gallery__thumb:hover { opacity: 1; }
    .property-gallery__thumb--active {
      opacity: 1;
      border-color: var(--terracotta);
    }
    .property-gallery--single .property-gallery__arrow,
    .property-gallery--single .property-gallery__counter,
    .property-gallery--single .property-gallery__thumbs { display: none; }

    /* ---- Sidebar / contact ---- */
    .property-sidebar {
      padding: 1.5rem 0 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .property-contact-card {
      background: var(--bone);
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
    }
    .property-contact-card h3 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .property-contact-card p {
      font-size: 0.875rem;
      color: var(--ink-mute);
      margin-bottom: 0.4rem;
      line-height: 1.5;
    }
    .property-contact-card p strong { color: var(--ink-soft); font-weight: 600; }

    .property-cta {
      display: flex;
      gap: 0.625rem;
      padding: 1rem;
      background: var(--bone);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }
    .property-cta .btn {
      flex: 1;
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      gap: 0.4rem;
    }
    .btn--whatsapp {
      background: #25D366;
      color: #fff;
      border-radius: var(--radius-full);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all var(--t-base);
    }
    .btn--whatsapp:hover { background: #1ebe57; color: #fff; transform: translateY(-1px); }
    .btn--phone {
      background: var(--ink);
      color: var(--bone);
      border-radius: var(--radius-full);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all var(--t-base);
    }
    .btn--phone:hover { background: var(--terracotta); color: var(--bone); transform: translateY(-1px); }

    /* ---- Content ---- */
    .property-content {
      padding: 2rem 0 1rem;
    }

    .property-header {
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2rem;
    }
    .property-header__type {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 0.875rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--terracotta);
      border-radius: var(--radius-full);
    }
    .property-header__title {
      font-family: var(--font-display);
      font-size: clamp(1.875rem, 4.5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 0.875rem;
    }
    .property-header__location {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      color: var(--ink-mute);
    }
    .property-header__location svg { color: var(--terracotta); flex-shrink: 0; }

    .property-price {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 500;
      color: var(--terracotta);
      margin-bottom: 2.25rem;
      letter-spacing: -0.01em;
    }

    .property-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (min-width: 540px) { .property-features { grid-template-columns: repeat(3, 1fr); } }

    .property-feature {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 1rem 1.25rem;
      background: var(--bone);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      transition: all var(--t-base);
    }
    .property-feature:hover {
      border-color: var(--terracotta-soft);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .property-feature__icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--terracotta-tint);
      color: var(--terracotta);
      border-radius: 10px;
      flex-shrink: 0;
    }
    .property-feature__text {
      display: flex;
      flex-direction: column;
      font-size: 0.8125rem;
      color: var(--ink-mute);
      line-height: 1.3;
    }
    .property-feature__value {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--ink);
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 0.15rem;
    }

    .property-section { margin-bottom: 2.5rem; }
    .property-section__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
      position: relative;
      padding-left: 1rem;
    }
    .property-section__title::before {
      content: '';
      position: absolute;
      left: 0; top: 0.4em;
      width: 3px; height: 1em;
      background: var(--terracotta);
      border-radius: 2px;
    }

    .property-description {
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--ink-soft);
      white-space: pre-line;
    }

    .property-amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
    }
    .property-amenity {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      font-size: 0.875rem;
      color: var(--ink-soft);
      background: var(--bone);
      border: 1px solid var(--line);
      border-radius: var(--radius-full);
      text-transform: capitalize;
    }
    .property-amenity svg { color: var(--terracotta); flex-shrink: 0; }

    /* ---- Desktop layout: gallery + sidebar side by side ---- */
    @media (min-width: 1024px) {
      .property-page__inner {
        display: grid;
        grid-template-columns: 1fr 380px;
        grid-template-rows: auto 1fr;
        gap: 0 2.5rem;
      }
      .property-gallery {
        grid-column: 1;
        grid-row: 1;
      }
      .property-sidebar {
        grid-column: 2;
        grid-row: 1 / span 2;
        padding: 0;
        position: sticky;
        top: 96px;
        align-self: start;
      }
      .property-content {
        grid-column: 1;
        grid-row: 2;
        padding: 2.5rem 0 0;
      }
      .property-cta {
        position: static;
        flex-direction: column;
        background: var(--bone);
        padding: 1.5rem;
      }
    }

    /* ---- Loading / Error ---- */
    .property-loading,
    .property-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .property-error__icon { width: 64px; height: 64px; margin-bottom: 1.25rem; color: var(--ash); }
    .property-error__title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .property-error__text { color: var(--ink-mute); margin-bottom: 1.75rem; max-width: 380px; }

    .spinner {
      width: 44px; height: 44px;
      border: 2.5px solid var(--line);
      border-top-color: var(--terracotta);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__brand" aria-label="Vairo Propiedades — inicio">
        <img src="assets/images/logos/vairo-logo.png" alt="" class="header__brand-mark">
        <span class="header__brand-text">
          <span class="header__brand-name">Vairo</span>
          <span class="header__brand-tagline">Propiedades</span>
        </span>
      </a>

      <nav class="nav" aria-label="Navegación principal">
        <a href="index.html#properties" class="nav__link">Propiedades</a>
        <a href="index.html#services" class="nav__link">Servicios</a>
        <a href="index.html#about" class="nav__link">Nosotros</a>
        <a href="index.html#contact" class="nav__link">Contacto</a>
        <a href="index.html#contact" class="nav__cta">Hablar con un asesor</a>
      </nav>

      <button class="header__menu-btn" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="property-page" id="property-page">
    <div class="property-loading">
      <div class="spinner"></div>
      <p style="margin-top: 1.25rem; color: var(--ink-mute); font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase;">Cargando propiedad</p>
    </div>
  </main>

  <!-- Footer (compact for inner pages) -->
  <footer class="footer" style="margin-top: 4rem; padding: 3rem 0 2rem;">
    <div class="container">
      <div class="footer__bottom" style="margin-top: 0; padding-top: 0; border-top: none;">
        <span>© <span id="current-year"></span> Vairo Propiedades · Lobos, Bs. As.</span>
        <span>+54 2227 52-2178 · hola@vairopropiedades.com.ar</span>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/properties-data.js"></script>
  <script>
    // Get property ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = parseInt(urlParams.get('id'));

    // Format price
    function formatPrice(price, currency) {
      if (currency === 'USD') {
        return `USD ${price.toLocaleString('es-AR')}`;
      }
      return `$ ${price.toLocaleString('es-AR')}`;
    }

    function resolveImageSrc(src) {
      if (!src) return null;
      if (src.startsWith('http://') || src.startsWith('https://') ||
          src.startsWith('data:') || src.startsWith('blob:') ||
          src.startsWith('/')) {
        return src;
      }
      return `assets/images/properties/${src}`;
    }

    function getPropertyImage(property) {
      if (property && property.coverImage) return resolveImageSrc(property.coverImage);
      if (property && property.images && property.images.length > 0) return resolveImageSrc(property.images[0]);
      const imageNumber = ((property.id - 1) % 25) + 1;
      return `assets/images/properties/prop-${imageNumber}.jpg`;
    }

    function getTypeLabel(type) {
      const types = { casa:'Casa', departamento:'Departamento', quinta:'Quinta', campo:'Campo', ph:'PH', local:'Local Comercial', oficina:'Oficina', terreno:'Terreno', lote:'Lote', cochera:'Cochera' };
      return types[type] || type;
    }

    function getOperationLabel(operation) {
      const operations = { venta:'En Venta', alquiler:'En Alquiler', vendido:'Vendido', alquilado:'Alquilado', reservado:'Reservado' };
      return operations[operation] || operation;
    }

    function getAllImages(property) {
      const images = [];
      const cover = resolveImageSrc(property.coverImage);
      if (cover) images.push(cover);
      if (property.images && property.images.length > 0) {
        property.images.forEach(raw => {
          const src = resolveImageSrc(raw);
          if (src && !images.includes(src)) images.push(src);
        });
      }
      if (images.length === 0) {
        images.push(getPropertyImage(property));
      }
      return images;
    }

    function renderProperty(property) {
      const page = document.getElementById('property-page');
      const whatsappMessage = encodeURIComponent(`Hola Vairo, me interesa la propiedad: ${property.title} (ID: ${property.id})`);
      const allImages = getAllImages(property);
      const isSingle = allImages.length <= 1;

      document.title = `${property.title} · Vairo Propiedades`;

      const thumbsHTML = allImages.map((src, i) =>
        `<img src="${src}" alt="Foto ${i + 1}" class="property-gallery__thumb${i === 0 ? ' property-gallery__thumb--active' : ''}" data-index="${i}" onerror="this.style.display='none'">`
      ).join('');

      const locationParts = [
        property.location.address,
        property.location.neighborhood,
        property.location.city
      ].filter(Boolean);

      page.innerHTML = `
        <a href="index.html#properties" class="property-page__back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver a propiedades
        </a>

        <div class="property-page__inner">
          <div class="property-gallery${isSingle ? ' property-gallery--single' : ''}">
            <div class="property-gallery__main-wrapper">
              <img src="${allImages[0]}" alt="${property.title}" class="property-gallery__main" onerror="this.src='https://placehold.co/800x600/E8DDC9/6B5D4F?text=Sin+imagen'">
              <button class="property-gallery__arrow property-gallery__arrow--prev" aria-label="Imagen anterior">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
              <button class="property-gallery__arrow property-gallery__arrow--next" aria-label="Imagen siguiente">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
              <span class="property-gallery__counter">1 / ${allImages.length}</span>
              <span class="property-gallery__badge property-gallery__badge--${property.operation}">
                ${getOperationLabel(property.operation)}
              </span>
            </div>
            <div class="property-gallery__thumbs">
              ${thumbsHTML}
            </div>
          </div>

          <aside class="property-sidebar">
            <div class="property-contact-card">
              <h3>Vairo Propiedades</h3>
              <p><strong>Ubicación:</strong> Lobos, Buenos Aires</p>
              <p><strong>Horarios:</strong> Lun–Vie 9–18 hs · Sáb 9–13 hs</p>
              <p><strong>Email:</strong> hola@vairopropiedades.com.ar</p>
            </div>

            <div class="property-cta">
              <a href="https://wa.me/542227522178?text=${whatsappMessage}" target="_blank" class="btn btn--whatsapp">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                WhatsApp
              </a>
              <a href="tel:+542227522178" class="btn btn--phone">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
                Llamar
              </a>
            </div>
          </aside>

          <div class="property-content">
            <header class="property-header">
              <span class="property-header__type">${getTypeLabel(property.type)}</span>
              <h1 class="property-header__title">${property.title}</h1>
              <p class="property-header__location">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
                ${locationParts.join(', ')}
              </p>
            </header>

            <p class="property-price">${property.showPrice !== false ? formatPrice(property.price, property.currency) : 'Precio: Consultar'}</p>

            <div class="property-features">
              ${property.features.bedrooms > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M3 7v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
                      <path d="M21 7H3l2-4h14l2 4z"/>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.bedrooms}</span>
                    Ambientes
                  </div>
                </div>
              ` : ''}
              ${property.features.bathrooms > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/>
                      <line x1="2" y1="12" x2="22" y2="12"/>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.bathrooms}</span>
                    ${property.features.bathrooms === 1 ? 'Baño' : 'Baños'}
                  </div>
                </div>
              ` : ''}
              <div class="property-feature">
                <div class="property-feature__icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  </svg>
                </div>
                <div class="property-feature__text">
                  <span class="property-feature__value">${property.features.area} m²</span>
                  Superficie total
                </div>
              </div>
              ${property.features.coveredArea > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.coveredArea} m²</span>
                    Cubiertos
                  </div>
                </div>
              ` : ''}
              ${property.features.garage > 0 ? `
                <div class="property-feature">
                  <div class="property-feature__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M19 17h2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10h2"/>
                      <circle cx="6.5" cy="17.5" r="2.5"/>
                      <circle cx="17.5" cy="17.5" r="2.5"/>
                    </svg>
                  </div>
                  <div class="property-feature__text">
                    <span class="property-feature__value">${property.features.garage}</span>
                    ${property.features.garage === 1 ? 'Cochera' : 'Cocheras'}
                  </div>
                </div>
              ` : ''}
            </div>

            <section class="property-section">
              <h2 class="property-section__title">Descripción</h2>
              <p class="property-description">${property.description}</p>
            </section>

            ${property.amenities && property.amenities.length > 0 ? `
              <section class="property-section">
                <h2 class="property-section__title">Características</h2>
                <div class="property-amenities">
                  ${property.amenities.map(amenity => `
                    <span class="property-amenity">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                      ${amenity}
                    </span>
                  `).join('')}
                </div>
              </section>
            ` : ''}
          </div>
        </div>
      `;

      // Mobile menu
      initMobileMenu();

      // Carousel
      if (allImages.length > 1) {
        let currentIndex = 0;
        const mainImg = document.querySelector('.property-gallery__main');
        const counter = document.querySelector('.property-gallery__counter');
        const thumbs = document.querySelectorAll('.property-gallery__thumb');
        const thumbsContainer = document.querySelector('.property-gallery__thumbs');
        const wrapper = document.querySelector('.property-gallery__main-wrapper');

        function showSlide(index) {
          currentIndex = ((index % allImages.length) + allImages.length) % allImages.length;
          mainImg.src = allImages[currentIndex];
          counter.textContent = `${currentIndex + 1} / ${allImages.length}`;
          thumbs.forEach((t, i) => t.classList.toggle('property-gallery__thumb--active', i === currentIndex));
          const activeThumb = thumbs[currentIndex];
          if (activeThumb && thumbsContainer) {
            const offset = activeThumb.offsetLeft - thumbsContainer.offsetWidth / 2 + activeThumb.offsetWidth / 2;
            thumbsContainer.scrollTo({ left: offset, behavior: 'smooth' });
          }
        }

        document.querySelector('.property-gallery__arrow--prev').addEventListener('click', () => showSlide(currentIndex - 1));
        document.querySelector('.property-gallery__arrow--next').addEventListener('click', () => showSlide(currentIndex + 1));

        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => showSlide(parseInt(thumb.dataset.index)));
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft') showSlide(currentIndex - 1);
          if (e.key === 'ArrowRight') showSlide(currentIndex + 1);
        });

        let touchStartX = 0;
        wrapper.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        wrapper.addEventListener('touchend', (e) => {
          const diff = touchStartX - e.changedTouches[0].screenX;
          if (Math.abs(diff) > 50) showSlide(currentIndex + (diff > 0 ? 1 : -1));
        }, { passive: true });
      }
    }

    function showError() {
      const page = document.getElementById('property-page');
      page.innerHTML = `
        <div class="property-error">
          <svg class="property-error__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <h2 class="property-error__title">Propiedad no encontrada</h2>
          <p class="property-error__text">La propiedad que buscás no existe o ya no está disponible.</p>
          <a href="index.html#properties" class="btn btn--primary btn--lg">Ver todas las propiedades</a>
        </div>
      `;
    }

    function initMobileMenu() {
      const menuBtn = document.querySelector('.header__menu-btn');
      const nav = document.querySelector('.nav');
      menuBtn?.addEventListener('click', () => {
        menuBtn.classList.toggle('active');
        nav?.classList.toggle('active');
        document.body.style.overflow = nav?.classList.contains('active') ? 'hidden' : '';
      });
    }

    async function init() {
      if (!propertyId) { showError(); return; }

      try {
        if (window.API) {
          const property = await window.API.getProperty(propertyId);
          if (property) { renderProperty(property); return; }
        }
      } catch (e) {
        console.warn('API fetch failed, trying local data');
      }

      if (window.PROPERTIES_DATA) {
        const property = window.PROPERTIES_DATA.properties.find(p => p.id === propertyId);
        if (property) { renderProperty(property); return; }
      }

      await new Promise((resolve) => {
        window.addEventListener('properties-loaded', resolve, { once: true });
        setTimeout(resolve, 5000);
      });

      if (window.PROPERTIES_DATA) {
        const property = window.PROPERTIES_DATA.properties.find(p => p.id === propertyId);
        if (property) { renderProperty(property); return; }
      }

      showError();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
