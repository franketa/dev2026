<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Panel de tiempo — VentureByte</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A5CF5'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' fill='white'%3EV%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0E20;
      --ink: #060918;
      --card: #0E142E;
      --primary: #0A5CF5;
      --accent: #4D8CF5;
      --danger: #F03D3D;
      --line: rgba(148, 170, 255, 0.13);
      --line-strong: rgba(148, 170, 255, 0.24);
      --text: rgba(224, 232, 252, 0.92);
      --dim: rgba(224, 232, 252, 0.6);
      --dim-strong: rgba(224, 232, 252, 0.8);
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Instrument Sans', 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(rgba(10, 92, 245, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10, 92, 245, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }
    .hidden { display: none !important; }

    /* ---- Header ---- */
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 0 1.5rem;
    }
    .top__brand { display: flex; align-items: baseline; gap: 0.6rem; }
    .top__logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; letter-spacing: 0.02em; }
    .top__tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.14em; }
    .top__actions { display: flex; align-items: center; gap: 0.75rem; }
    .top__role { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; border: 1px solid var(--line-strong); padding: 0.25rem 0.55rem; border-radius: 999px; }

    /* ---- Cards ---- */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card__label {
      font-family: var(--font-mono); font-size: 0.65rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 0.9rem;
    }

    /* ---- Forms ---- */
    label { display: block; font-family: var(--font-mono); font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin: 0 0 0.4rem; }
    input, select, textarea {
      width: 100%; background: var(--ink); color: var(--text);
      border: 1px solid var(--line-strong); border-radius: 8px;
      padding: 0.65rem 0.75rem; font-family: var(--font-body); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s ease;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    input[type="date"] { color-scheme: dark; }
    .field { margin-bottom: 0.9rem; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: 0.7rem 1.3rem; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s ease, opacity 0.2s ease;
    }
    .btn:hover { background: var(--accent); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn--danger { background: var(--danger); }
    .btn--danger:hover { background: #ff5c5c; }
    .btn--ghost { background: transparent; border: 1px solid var(--line-strong); color: var(--dim-strong); font-weight: 500; }
    .btn--ghost:hover { background: rgba(148, 170, 255, 0.08); }
    .btn--sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; border-radius: 6px; }
    .btn--block { width: 100%; }

    /* ---- Login ---- */
    .login { max-width: 380px; margin: 10vh auto 0; }
    .login__title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; margin-bottom: 0.35rem; }
    .login__sub { color: var(--dim); font-size: 0.9rem; margin-bottom: 1.4rem; }

    /* ---- Timer ---- */
    .timer { text-align: center; padding: 1.75rem 1.25rem; }
    .timer__clock {
      font-family: var(--font-mono); font-size: clamp(2.6rem, 10vw, 4rem); font-weight: 600;
      letter-spacing: 0.04em; line-height: 1; margin: 0.5rem 0 0.4rem;
      font-variant-numeric: tabular-nums;
    }
    .timer__clock--on { color: var(--accent); }
    .timer__project { color: var(--dim-strong); font-size: 0.95rem; min-height: 1.3em; }
    .timer__form { text-align: left; max-width: 460px; margin: 1.4rem auto 0; }
    .timer__actions { display: flex; gap: 0.6rem; margin-top: 0.4rem; }
    .timer__actions .btn { flex: 1; }
    .pulse {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent); margin-right: 0.55rem; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    /* ---- Stats ---- */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .stat__num { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat__hint { color: var(--dim); font-size: 0.8rem; margin-top: 0.2rem; }

    /* ---- Listas y tabla ---- */
    .entry { display: flex; justify-content: space-between; gap: 0.75rem; padding: 0.7rem 0; border-bottom: 1px solid var(--line); }
    .entry:last-child { border-bottom: none; }
    .entry__main { min-width: 0; }
    .entry__project { font-weight: 600; font-size: 0.92rem; }
    .entry__memo { color: var(--dim); font-size: 0.85rem; margin-top: 0.15rem; overflow-wrap: anywhere; }
    .entry__meta { text-align: right; flex-shrink: 0; }
    .entry__dur { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .entry__time { color: var(--dim); font-family: var(--font-mono); font-size: 0.72rem; margin-top: 0.15rem; }
    .empty { color: var(--dim); font-size: 0.9rem; padding: 0.5rem 0; }

    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 640px; }
    th { font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--dim); text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--line-strong); white-space: nowrap; }
    td { padding: 0.6rem; border-bottom: 1px solid var(--line); vertical-align: top; }
    td.mono { font-family: var(--font-mono); font-size: 0.8rem; white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ---- Tabs admin ---- */
    .tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
    .tab {
      background: transparent; border: 1px solid var(--line); color: var(--dim-strong);
      font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 0.5rem 0.9rem; border-radius: 999px; cursor: pointer; transition: all 0.2s ease;
    }
    .tab--active { border-color: var(--primary); color: #fff; background: rgba(10, 92, 245, 0.18); }

    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .summary { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .chip {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--dim-strong);
      border: 1px solid var(--line-strong); border-radius: 999px; padding: 0.35rem 0.7rem;
      font-variant-numeric: tabular-nums;
    }
    .chip--total { color: #fff; border-color: var(--primary); background: rgba(10, 92, 245, 0.18); }

    .proj-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 0; border-bottom: 1px solid var(--line); }
    .proj-row:last-child { border-bottom: none; }
    .proj-row__name { flex: 1; font-weight: 500; min-width: 0; overflow-wrap: anywhere; }
    .proj-row__name--off { color: var(--dim); text-decoration: line-through; }
    .proj-row input { flex: 1; padding: 0.4rem 0.6rem; font-size: 0.9rem; }
    .proj-add { display: flex; gap: 0.6rem; margin-bottom: 0.75rem; }
    .proj-add input { flex: 1; }

    .badge { font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.2rem 0.5rem; border-radius: 999px; border: 1px solid var(--line-strong); color: var(--dim); flex-shrink: 0; }
    .badge--on { color: #7ee2a8; border-color: rgba(126, 226, 168, 0.4); }

    .toast {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      background: var(--ink); border: 1px solid var(--line-strong); color: var(--text);
      padding: 0.7rem 1.1rem; border-radius: 8px; font-size: 0.88rem;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; max-width: 90vw;
    }
    .toast--show { opacity: 1; }
    .toast--err { border-color: var(--danger); }

    @media (max-width: 560px) {
      .stats { grid-template-columns: 1fr; }
      .top { flex-wrap: wrap; gap: 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- ================= LOGIN ================= -->
    <section id="view-login" class="login hidden">
      <div class="card">
        <h1 class="login__title">VENTURE<span style="color: var(--primary)">.</span></h1>
        <p class="login__sub">Panel interno de tiempo. Ingresá tu clave de acceso.</p>
        <form id="login-form">
          <div class="field">
            <label for="login-key">Clave</label>
            <input type="password" id="login-key" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn--block">Ingresar</button>
        </form>
      </div>
    </section>

    <!-- ================= APP ================= -->
    <div id="view-app" class="hidden">
      <header class="top">
        <div class="top__brand">
          <span class="top__logo">VENTURE<span style="color: var(--primary)">.</span></span>
          <span class="top__tag">Tiempo</span>
        </div>
        <div class="top__actions">
          <span class="top__role" id="role-badge"></span>
          <button class="btn btn--ghost btn--sm" id="btn-logout">Salir</button>
        </div>
      </header>

      <!-- ===== Vista empleado ===== -->
      <section id="view-employee" class="hidden">
        <div class="card timer">
          <div class="card__label">Timer</div>
          <div class="timer__clock" id="clock">00:00:00</div>
          <div class="timer__project" id="clock-project">Sin actividad</div>
          <div class="timer__form">
            <div class="field" id="field-project">
              <label for="sel-project">Trabajo</label>
              <select id="sel-project"></select>
            </div>
            <div class="field">
              <label for="inp-memo">Memo</label>
              <input type="text" id="inp-memo" maxlength="500" placeholder="¿En qué estás trabajando?" />
            </div>
            <div class="timer__actions">
              <button class="btn" id="btn-start">Iniciar</button>
              <button class="btn btn--danger hidden" id="btn-stop">Detener</button>
              <button class="btn btn--ghost hidden" id="btn-cancel" title="Descarta el timer sin registrarlo">Descartar</button>
            </div>
          </div>
        </div>

        <div class="stats">
          <div class="card">
            <div class="card__label">Hoy</div>
            <div class="stat__num" id="stat-today">0h 00m</div>
            <div class="stat__hint" id="stat-today-count"></div>
          </div>
          <div class="card">
            <div class="card__label">Esta semana</div>
            <div class="stat__num" id="stat-week">0h 00m</div>
            <div class="stat__hint">Desde el lunes</div>
          </div>
        </div>

        <div class="card">
          <div class="card__label">Registros de hoy</div>
          <div id="today-list"></div>
        </div>
      </section>

      <!-- ===== Vista admin ===== -->
      <section id="view-admin" class="hidden">
        <div class="tabs">
          <button class="tab tab--active" data-tab="records">Registros</button>
          <button class="tab" data-tab="projects">Trabajos</button>
        </div>

        <div id="tab-records">
          <div class="card">
            <div class="card__label">Filtros</div>
            <div class="filters">
              <div>
                <label for="f-from">Desde</label>
                <input type="date" id="f-from" />
              </div>
              <div>
                <label for="f-to">Hasta</label>
                <input type="date" id="f-to" />
              </div>
              <div>
                <label for="f-project">Trabajo</label>
                <select id="f-project"></select>
              </div>
            </div>
            <div class="summary" id="summary"></div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr><th>Fecha</th><th>Trabajo</th><th>Memo</th><th>Horario</th><th>Duración</th><th></th></tr>
                </thead>
                <tbody id="records-body"></tbody>
              </table>
            </div>
            <div class="empty hidden" id="records-empty">No hay registros para estos filtros.</div>
          </div>
        </div>

        <div id="tab-projects" class="hidden">
          <div class="card">
            <div class="card__label">Trabajos disponibles</div>
            <form class="proj-add" id="proj-add-form">
              <input type="text" id="proj-add-name" maxlength="100" placeholder="Nuevo trabajo (ej.: Sitio Haven Gym)" required />
              <button type="submit" class="btn">Agregar</button>
            </form>
            <div id="proj-list"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      'use strict';
      const $ = (id) => document.getElementById(id);
      const KEY_STORAGE = 'vb_tracker_key';

      let state = { role: null, projects: [], entries: [], running: null };
      let clockInterval = null;

      /* ---------- API ---------- */
      async function api(path, opts = {}) {
        const res = await fetch('/api/tracker' + path, {
          ...opts,
          headers: {
            'Content-Type': 'application/json',
            'x-tracker-key': localStorage.getItem(KEY_STORAGE) || '',
            ...(opts.headers || {}),
          },
        });
        const body = await res.json().catch(() => ({}));
        if (res.status === 401) { logout(false); throw new Error(body.error || 'Sesión inválida'); }
        if (!res.ok) throw new Error(body.error || 'Error del servidor');
        return body;
      }

      /* ---------- Helpers ---------- */
      function toast(msg, isErr = false) {
        const el = $('toast');
        el.textContent = msg;
        el.classList.toggle('toast--err', isErr);
        el.classList.add('toast--show');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('toast--show'), 3200);
      }

      const projectName = (id) => (state.projects.find((p) => p.id === id) || {}).name || '—';
      const durationMs = (e) => new Date(e.end || Date.now()) - new Date(e.start);

      function fmtDur(ms) {
        const mins = Math.round(ms / 60000);
        return Math.floor(mins / 60) + 'h ' + String(mins % 60).padStart(2, '0') + 'm';
      }
      function fmtClock(ms) {
        const s = Math.floor(ms / 1000);
        const p = (n) => String(n).padStart(2, '0');
        return p(Math.floor(s / 3600)) + ':' + p(Math.floor((s % 3600) / 60)) + ':' + p(s % 60);
      }
      const fmtTime = (iso) => new Date(iso).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
      const fmtDate = (iso) => new Date(iso).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const dayKey = (d) => {
        const x = new Date(d);
        return x.getFullYear() + '-' + String(x.getMonth() + 1).padStart(2, '0') + '-' + String(x.getDate()).padStart(2, '0');
      };
      function mondayOfWeek(d) {
        const x = new Date(d);
        x.setHours(0, 0, 0, 0);
        x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
        return x;
      }
      function esc(s) {
        const div = document.createElement('div');
        div.textContent = s || '';
        return div.innerHTML;
      }

      /* ---------- Vistas ---------- */
      function show(view) {
        $('view-login').classList.toggle('hidden', view !== 'login');
        $('view-app').classList.toggle('hidden', view === 'login');
        $('view-employee').classList.toggle('hidden', view !== 'employee');
        $('view-admin').classList.toggle('hidden', view !== 'admin');
      }

      function logout(clear = true) {
        if (clear) localStorage.removeItem(KEY_STORAGE);
        clearInterval(clockInterval);
        state = { role: null, projects: [], entries: [], running: null };
        show('login');
      }

      async function refresh() {
        state = await api('/state');
        $('role-badge').textContent = state.role === 'admin' ? 'Admin' : 'Equipo';
        if (state.role === 'admin') {
          show('admin');
          renderAdmin();
        } else {
          show('employee');
          renderEmployee();
        }
      }

      /* ---------- Empleado ---------- */
      function renderEmployee() {
        const sel = $('sel-project');
        sel.innerHTML = state.projects.length
          ? state.projects.map((p) => `<option value="${p.id}">${esc(p.name)}</option>`).join('')
          : '<option value="">— No hay trabajos cargados —</option>';

        const running = state.running;
        $('btn-start').classList.toggle('hidden', !!running);
        $('btn-stop').classList.toggle('hidden', !running);
        $('btn-cancel').classList.toggle('hidden', !running);
        $('field-project').classList.toggle('hidden', !!running);
        $('btn-start').disabled = !state.projects.length;

        clearInterval(clockInterval);
        const clockEl = $('clock');
        if (running) {
          $('clock-project').innerHTML = '<span class="pulse"></span>' + esc(projectName(running.projectId));
          $('inp-memo').value = running.memo || '';
          clockEl.classList.add('timer__clock--on');
          const tick = () => { clockEl.textContent = fmtClock(durationMs(running)); };
          tick();
          clockInterval = setInterval(tick, 1000);
        } else {
          clockEl.textContent = '00:00:00';
          clockEl.classList.remove('timer__clock--on');
          $('clock-project').textContent = 'Sin actividad';
          $('inp-memo').value = '';
        }

        const todayK = dayKey(new Date());
        const monday = mondayOfWeek(new Date());
        const done = state.entries.filter((e) => e.end);
        const todayEntries = done.filter((e) => dayKey(e.start) === todayK);
        const weekMs = done.filter((e) => new Date(e.start) >= monday).reduce((a, e) => a + durationMs(e), 0);
        const todayMs = todayEntries.reduce((a, e) => a + durationMs(e), 0);

        $('stat-today').textContent = fmtDur(todayMs);
        $('stat-today-count').textContent = todayEntries.length + (todayEntries.length === 1 ? ' registro' : ' registros');
        $('stat-week').textContent = fmtDur(weekMs);

        $('today-list').innerHTML = todayEntries.length
          ? todayEntries.slice().reverse().map((e) => `
              <div class="entry">
                <div class="entry__main">
                  <div class="entry__project">${esc(projectName(e.projectId))}</div>
                  ${e.memo ? `<div class="entry__memo">${esc(e.memo)}</div>` : ''}
                </div>
                <div class="entry__meta">
                  <div class="entry__dur">${fmtDur(durationMs(e))}</div>
                  <div class="entry__time">${fmtTime(e.start)}–${fmtTime(e.end)}</div>
                </div>
              </div>`).join('')
          : '<div class="empty">Todavía no registraste tiempo hoy.</div>';
      }

      $('btn-start').addEventListener('click', async () => {
        try {
          await api('/start', { method: 'POST', body: JSON.stringify({ projectId: $('sel-project').value, memo: $('inp-memo').value.trim() }) });
          await refresh();
        } catch (e) { toast(e.message, true); }
      });

      $('btn-stop').addEventListener('click', async () => {
        try {
          await api('/stop', { method: 'POST', body: JSON.stringify({ memo: $('inp-memo').value.trim() }) });
          toast('Tiempo registrado');
          await refresh();
        } catch (e) { toast(e.message, true); }
      });

      $('btn-cancel').addEventListener('click', async () => {
        try {
          await api('/cancel', { method: 'POST', body: '{}' });
          toast('Timer descartado');
          await refresh();
        } catch (e) { toast(e.message, true); }
      });

      /* ---------- Admin ---------- */
      function renderAdmin() {
        const opts = '<option value="">Todos</option>' + state.projects.map((p) => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
        const prev = $('f-project').value;
        $('f-project').innerHTML = opts;
        $('f-project').value = prev;
        renderRecords();
        renderProjects();
      }

      function renderRecords() {
        const from = $('f-from').value ? new Date($('f-from').value + 'T00:00:00') : null;
        const to = $('f-to').value ? new Date($('f-to').value + 'T23:59:59') : null;
        const pid = $('f-project').value;

        const rows = state.entries.filter((e) => {
          const d = new Date(e.start);
          if (from && d < from) return false;
          if (to && d > to) return false;
          if (pid && e.projectId !== pid) return false;
          return true;
        }).slice().reverse();

        const finished = rows.filter((e) => e.end);
        const totalMs = finished.reduce((a, e) => a + durationMs(e), 0);
        const byProject = {};
        finished.forEach((e) => { byProject[e.projectId] = (byProject[e.projectId] || 0) + durationMs(e); });

        $('summary').innerHTML =
          `<span class="chip chip--total">Total: ${fmtDur(totalMs)}</span>` +
          Object.entries(byProject)
            .sort((a, b) => b[1] - a[1])
            .map(([id, ms]) => `<span class="chip">${esc(projectName(id))}: ${fmtDur(ms)}</span>`).join('');

        $('records-body').innerHTML = rows.map((e) => `
          <tr>
            <td class="mono">${fmtDate(e.start)}</td>
            <td>${esc(projectName(e.projectId))}</td>
            <td>${esc(e.memo) || '<span style="color:var(--dim)">—</span>'}</td>
            <td class="mono">${fmtTime(e.start)}–${e.end ? fmtTime(e.end) : '<span class="pulse"></span>ahora'}</td>
            <td class="mono">${e.end ? fmtDur(durationMs(e)) : 'en curso'}</td>
            <td><button class="btn btn--ghost btn--sm" data-del="${e.id}">Borrar</button></td>
          </tr>`).join('');
        $('records-empty').classList.toggle('hidden', rows.length > 0);
      }

      function renderProjects() {
        $('proj-list').innerHTML = state.projects.length
          ? state.projects.map((p) => `
              <div class="proj-row" data-id="${p.id}">
                <span class="proj-row__name ${p.active ? '' : 'proj-row__name--off'}">${esc(p.name)}</span>
                <span class="badge ${p.active ? 'badge--on' : ''}">${p.active ? 'Activo' : 'Pausado'}</span>
                <button class="btn btn--ghost btn--sm" data-rename="${p.id}">Renombrar</button>
                <button class="btn btn--ghost btn--sm" data-toggle="${p.id}">${p.active ? 'Pausar' : 'Activar'}</button>
              </div>`).join('')
          : '<div class="empty">Sin trabajos. Agregá el primero arriba.</div>';
      }

      document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((x) => x.classList.toggle('tab--active', x === t));
        $('tab-records').classList.toggle('hidden', t.dataset.tab !== 'records');
        $('tab-projects').classList.toggle('hidden', t.dataset.tab !== 'projects');
      }));

      ['f-from', 'f-to', 'f-project'].forEach((id) => $(id).addEventListener('change', renderRecords));

      $('proj-add-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        try {
          await api('/projects', { method: 'POST', body: JSON.stringify({ name: $('proj-add-name').value.trim() }) });
          $('proj-add-name').value = '';
          toast('Trabajo agregado');
          await refresh();
        } catch (e) { toast(e.message, true); }
      });

      $('view-admin').addEventListener('click', async (ev) => {
        const btn = ev.target.closest('button');
        if (!btn) return;
        try {
          if (btn.dataset.toggle) {
            const p = state.projects.find((x) => x.id === btn.dataset.toggle);
            await api('/projects/' + p.id, { method: 'POST', body: JSON.stringify({ active: !p.active }) });
            await refresh();
          } else if (btn.dataset.rename) {
            const row = btn.closest('.proj-row');
            const p = state.projects.find((x) => x.id === btn.dataset.rename);
            row.innerHTML = `<input type="text" value="${esc(p.name)}" maxlength="100" />
              <button class="btn btn--sm" data-save="${p.id}">Guardar</button>`;
            row.querySelector('input').focus();
          } else if (btn.dataset.save) {
            const name = btn.closest('.proj-row').querySelector('input').value.trim();
            if (name) await api('/projects/' + btn.dataset.save, { method: 'POST', body: JSON.stringify({ name }) });
            await refresh();
          } else if (btn.dataset.del) {
            if (btn.dataset.confirm) {
              await api('/entries/' + btn.dataset.del, { method: 'DELETE' });
              toast('Registro borrado');
              await refresh();
            } else {
              btn.dataset.confirm = '1';
              btn.textContent = '¿Seguro?';
              btn.classList.remove('btn--ghost');
              btn.classList.add('btn--danger');
              setTimeout(() => {
                if (btn.isConnected) {
                  delete btn.dataset.confirm;
                  btn.textContent = 'Borrar';
                  btn.classList.add('btn--ghost');
                  btn.classList.remove('btn--danger');
                }
              }, 3000);
            }
          }
        } catch (e) { toast(e.message, true); }
      });

      /* ---------- Login / arranque ---------- */
      $('login-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const key = $('login-key').value;
        try {
          const res = await fetch('/api/tracker/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key }),
          });
          if (!res.ok) throw new Error('Clave inválida');
          localStorage.setItem(KEY_STORAGE, key);
          $('login-key').value = '';
          await refresh();
        } catch (e) { toast(e.message, true); }
      });

      $('btn-logout').addEventListener('click', () => logout());

      // Refresco periódico suave para mantener datos al día
      setInterval(() => {
        if (state.role) refresh().catch(() => {});
      }, 60000);

      if (localStorage.getItem(KEY_STORAGE)) {
        refresh().catch(() => show('login'));
      } else {
        show('login');
      }
    })();
  </script>
</body>
</html>
