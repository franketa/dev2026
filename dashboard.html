<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #060b18;
      --bg-base: #0c1425;
      --bg-surface: #131d33;
      --bg-elevated: #1a2742;
      --border-subtle: #1e2d4a;
      --border-default: #273754;
      --border-hover: #334971;
      --text-primary: #e8edf5;
      --text-secondary: #8899b4;
      --text-tertiary: #5a6d8a;
      --accent-blue: #4b8df8;
      --accent-blue-dim: #2a5bb8;
      --accent-green: #34d399;
      --accent-green-dim: rgba(52, 211, 153, 0.12);
      --accent-amber: #fbbf24;
      --accent-amber-dim: rgba(251, 191, 36, 0.10);
      --accent-purple: #a78bfa;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(75, 141, 248, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── HEADER ─── */
    header {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 36px;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-blue);
      opacity: 0;
      animation: fadeSlideUp 0.6s ease forwards;
    }

    .header-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text-primary);
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 0.1s forwards;
    }

    .header-title span {
      color: var(--text-tertiary);
      font-weight: 300;
    }

    .header-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 0.2s forwards;
    }

    /* ─── STATS BAR ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.15s; }
    .stat-card:nth-child(2) { animation-delay: 0.22s; }
    .stat-card:nth-child(3) { animation-delay: 0.29s; }
    .stat-card:nth-child(4) { animation-delay: 0.36s; }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-blue), transparent); }
    .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-amber), transparent); }
    .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-green), transparent); }
    .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-purple), transparent); }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-value.blue { color: var(--accent-blue); }
    .stat-value.amber { color: var(--accent-amber); }
    .stat-value.green { color: var(--accent-green); }
    .stat-value.purple { color: var(--accent-purple); }

    .stat-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    /* ─── SEARCH ─── */
    .search-section {
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease 0.4s forwards;
    }

    .search-wrapper {
      position: relative;
      max-width: 480px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--text-tertiary); }

    .search-input:focus {
      border-color: var(--accent-blue-dim);
      box-shadow: 0 0 0 3px rgba(75, 141, 248, 0.08);
    }

    .search-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 10px;
    }

    /* ─── CLIENT GRID ─── */
    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      margin-bottom: 64px;
    }

    .client-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
      position: relative;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease forwards;
      display: flex;
      flex-direction: column;
    }

    .client-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(75, 141, 248, 0.05);
      transform: translateY(-2px);
    }

    .client-card.hidden {
      display: none;
    }

    /* Card header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .card-icon {
      font-size: 28px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .card-title-group {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .card-category {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .card-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-green);
      background: var(--accent-green-dim);
      padding: 4px 10px;
      border-radius: 99px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    /* Description */
    .card-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 18px;
    }

    /* Tech pills */
    .card-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }

    .tech-pill {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 500;
      color: var(--accent-blue);
      background: rgba(75, 141, 248, 0.08);
      border: 1px solid rgba(75, 141, 248, 0.15);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* Features */
    .card-features {
      list-style: none;
      margin-bottom: 18px;
    }

    .card-features li {
      font-size: 12.5px;
      color: var(--text-secondary);
      padding: 4px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .card-features li::before {
      content: '✓';
      color: var(--accent-green);
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Pricing */
    .card-pricing {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }

    .pricing-item {}

    .pricing-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .pricing-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--accent-amber);
      letter-spacing: -0.02em;
    }

    .pricing-value .suffix {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* Next steps */
    .card-next {
      margin-bottom: 18px;
    }

    .card-next-title {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .card-next-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-next-list li {
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(167, 139, 250, 0.06);
      border: 1px solid rgba(167, 139, 250, 0.12);
      padding: 3px 10px;
      border-radius: var(--radius-sm);
    }

    /* Card footer */
    .card-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent-blue-dim);
      border: 1px solid rgba(75, 141, 248, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-blue);
      box-shadow: 0 2px 12px rgba(75, 141, 248, 0.25);
    }

    .btn-secondary {
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
    }

    .btn-secondary:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .btn-disabled {
      color: var(--text-tertiary);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      cursor: default;
      opacity: 0.5;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border-subtle);
      padding: 32px 0;
      text-align: center;
    }

    .footer-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .client-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .wrapper { padding: 0 16px; }
      header { padding: 32px 0 28px; }
      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stat-card { padding: 16px 18px; }
      .client-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .client-card { padding: 22px; }
      .header-inner { flex-direction: column; align-items: flex-start; }
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-tertiary);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 15px;
    }
  </style>
</head>

      pricing: { development: 12000, maintenance: 350 },
      nextSteps: ["Pasarela de pago (Mercado Pago)", "Push notifications", "Analytics de ventas"],
      lastUpdate: "2026-03-01"
    },
    {
      id: "prohousetattoo",
      name: "Prohouse Tattoo",
      description: "Estudio de tatuajes en Punta del Este. Tatuajes personalizados y cover-ups de alta calidad por Willy Osano.",
      category: "Arte",
      icon: "🎨",
      techStack: ["HTML", "CSS", "JavaScript"],
      status: "activo",
      localPath: "clients/prohousetattoo/index.html",
      prodUrl: null,
      features: ["Galería con lightbox interactivo", "Servicios: personalizados y cover-ups", "Diseño futurista neon", "Formulario de reservas", "Links a WhatsApp e Instagram"],
      pricing: { development: 1000, maintenance: 80 },
      nextSteps: ["Galería con fotos reales", "Sistema de citas online", "Google Business Profile"],
      lastUpdate: "2026-01-15"
    },
    {
      id: "santorinienespanol",
      name: "Santorini En Español",
      description: "Tours privados en Santorini para hispanohablantes. Experiencias personalizadas sin barreras de idioma.",
      category: "Turismo",
      icon: "🏝️",
      techStack: ["HTML", "CSS", "JavaScript"],
      status: "activo",
      localPath: "clients/santorinienespanol/index.html",
      prodUrl: null,
      features: ["4 tipos de tours", "Diseño split-screen innovador", "Navegación por puntos de progreso", "Formulario con selección de tour", "Sección de valores (puntualidad, trato personal)"],
      pricing: { development: 2200, maintenance: 120 },
      nextSteps: ["Reservas online con calendario", "Galería de fotos de tours", "Blog de viajes a Santorini"],
      lastUpdate: "2026-02-20"
    }
  ];

  function formatCurrency(n) {
    return '$' + n.toLocaleString('en-US');
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function computeStats(data) {
    const active = data.filter(c => c.status === 'activo').length;
    const totalDev = data.reduce((s, c) => s + c.pricing.development, 0);
    const totalMaint = data.reduce((s, c) => s + c.pricing.maintenance, 0);
    const techs = new Set(data.flatMap(c => c.techStack));
    return { active, totalDev, totalMaint, techCount: techs.size };
  }

  function renderStats(data) {
    const stats = computeStats(data);
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Clientes Activos</div>
        <div class="stat-value blue">${stats.active}</div>
        <div class="stat-sub">proyectos en producción</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Valor Desarrollo</div>
        <div class="stat-value amber">${formatCurrency(stats.totalDev)}</div>
        <div class="stat-sub">inversión total portfolio</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ingresos Mensuales</div>
        <div class="stat-value green">${formatCurrency(stats.totalMaint)}<span style="font-size:14px;color:var(--text-tertiary)">/mes</span></div>
        <div class="stat-sub">mantenimiento recurrente</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tecnologías</div>
        <div class="stat-value purple">${stats.techCount}</div>
        <div class="stat-sub">stack tecnológico único</div>
      </div>
    `;
  }

  function renderCard(client, index) {
    const featuresHtml = client.features.map(f => `<li>${f}</li>`).join('');
    const techHtml = client.techStack.map(t => `<span class="tech-pill">${t}</span>`).join('');
    const nextHtml = client.nextSteps.map(s => `<li>${s}</li>`).join('');

    const prodBtn = client.prodUrl
      ? `<a href="${client.prodUrl}" target="_blank" class="btn btn-secondary">Producción ↗</a>`
      : `<span class="btn btn-disabled">Sin URL prod</span>`;

    return `
      <article class="client-card" data-name="${client.name.toLowerCase()}" data-category="${client.category.toLowerCase()}" data-tech="${client.techStack.join(' ').toLowerCase()}" style="animation-delay: ${0.45 + index * 0.06}s">
        <div class="card-header">
          <div class="card-icon">${client.icon}</div>
          <div class="card-title-group">
            <div class="card-name">${client.name}</div>
            <div class="card-category">${client.category}</div>
          </div>
          <span class="card-badge">${client.status}</span>
        </div>
        <p class="card-desc">${client.description}</p>
        <div class="card-tech">${techHtml}</div>
        <ul class="card-features">${featuresHtml}</ul>
        <div class="card-pricing">
          <div class="pricing-item">
            <div class="pricing-label">Desarrollo</div>
            <div class="pricing-value">${formatCurrency(client.pricing.development)}</div>
          </div>
          <div class="pricing-item">
            <div class="pricing-label">Mantenimiento</div>
            <div class="pricing-value">${formatCurrency(client.pricing.maintenance)}<span class="suffix">/mes</span></div>
          </div>
        </div>
        <div class="card-next">
          <div class="card-next-title">Próximos pasos</div>
          <ul class="card-next-list">${nextHtml}</ul>
        </div>
        <div class="card-footer">
          <span class="card-date">Actualizado ${formatDate(client.lastUpdate)}</span>
          <div class="card-actions">
            <a href="${client.localPath}" class="btn btn-primary">Ver local ↗</a>
            ${prodBtn}
          </div>
        </div>
      </article>
    `;
  }

  function renderDashboard() {
    renderStats(clients);

    const grid = document.getElementById('clientGrid');
    grid.innerHTML = clients.map((c, i) => renderCard(c, i)).join('');

    document.getElementById('headerMeta').textContent =
      `${clients.length} clientes · Actualizado ${formatDate(new Date().toISOString().slice(0, 10))}`;

    updateSearchCount(clients.length);
  }

  function updateSearchCount(visible) {
    const el = document.getElementById('searchCount');
    el.textContent = visible === clients.length
      ? `Mostrando ${visible} clientes`
      : `${visible} de ${clients.length} clientes`;
  }

  function filterClients(query) {
    const q = query.toLowerCase().trim();
    const cards = document.querySelectorAll('.client-card');
    let visible = 0;

    cards.forEach(card => {
      const name = card.dataset.name;
      const category = card.dataset.category;
      const tech = card.dataset.tech;
      const match = !q || name.includes(q) || category.includes(q) || tech.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) visible++;
    });

    updateSearchCount(visible);

    const grid = document.getElementById('clientGrid');
    const empty = grid.querySelector('.empty-state');
    if (visible === 0 && !empty) {
      grid.insertAdjacentHTML('beforeend', `
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-text">No se encontraron clientes para "${query}"</div>
        </div>
      `);
    } else if (visible > 0 && empty) {
      empty.remove();
    }
  }

  // Init
  renderDashboard();

  document.getElementById('searchInput').addEventListener('input', (e) => {
    filterClients(e.target.value);
  });
</script>

</body>
</html>
